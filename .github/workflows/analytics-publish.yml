name: Publish @forja/analytics

on:
  push:
    tags: ['analytics-v*']

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build & Publish to GitHub Packages
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: libs/analytics
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: 'https://npm.pkg.github.com'
          scope: '@forja'
          cache: npm
          cache-dependency-path: libs/analytics/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Set version from tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${REF_NAME#analytics-v}"
          npm version "$VERSION" --no-git-tag-version

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
