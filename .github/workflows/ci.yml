name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      admin: ${{ steps.filter.outputs.admin }}
      analytics: ${{ steps.filter.outputs.analytics }}
      astro-blog: ${{ steps.filter.outputs.astro-blog }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'Dockerfile'
            admin:
              - 'admin/**'
              - 'Dockerfile'
            analytics:
              - 'libs/analytics/**'
            astro-blog:
              - 'templates/astro-blog/**'

  backend:
    name: Backend (Rust)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: forja
          POSTGRES_PASSWORD: forja
          POSTGRES_DB: forja
        options: >-
          --health-cmd "pg_isready -U forja"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgres://forja:forja@localhost:5432/forja

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint with Clippy
        run: cargo clippy -- -D warnings

      - name: Initialize databases
        run: |
          psql "$DATABASE_URL" -c 'CREATE EXTENSION IF NOT EXISTS "uuid-ossp";'
          psql "$DATABASE_URL" -c 'CREATE EXTENSION IF NOT EXISTS "citext";'
          psql "$DATABASE_URL" -c 'CREATE EXTENSION IF NOT EXISTS "pg_trgm";'
          psql "$DATABASE_URL" -c 'CREATE DATABASE forja_test;'
          psql "postgres://forja:forja@localhost:5432/forja_test" -c 'CREATE EXTENSION IF NOT EXISTS "uuid-ossp";'
          psql "postgres://forja:forja@localhost:5432/forja_test" -c 'CREATE EXTENSION IF NOT EXISTS "citext";'
          psql "postgres://forja:forja@localhost:5432/forja_test" -c 'CREATE EXTENSION IF NOT EXISTS "pg_trgm";'

      - name: Run unit tests
        run: cargo test --lib

      - name: Run integration tests
        run: cargo test --test integration_tests
        env:
          TEST_DATABASE_URL: postgres://forja:forja@localhost:5432/forja_test

  admin:
    name: Admin (React)
    needs: changes
    if: needs.changes.outputs.admin == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: React Doctor
        if: github.event_name == 'pull_request'
        id: doctor
        uses: millionco/react-doctor@main
        with:
          directory: admin
          diff: main
          verbose: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check health score
        if: github.event_name == 'pull_request'
        env:
          SCORE: ${{ steps.doctor.outputs.score }}
        run: |
          echo "React Doctor score: $SCORE"
          if [ "$SCORE" -lt 50 ]; then
            echo "::warning::React health score is below threshold: $SCORE/100"
          fi

      - name: Run tests
        run: npm test

  analytics:
    name: Analytics Library
    needs: changes
    if: needs.changes.outputs.analytics == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: libs/analytics
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: libs/analytics/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Run tests with coverage
        run: npm test

  astro-blog:
    name: Astro Blog Template
    needs: changes
    if: needs.changes.outputs.astro-blog == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: templates/astro-blog/package-lock.json

      - name: Build analytics dependency
        working-directory: libs/analytics
        run: npm ci && npm run build

      - name: Install dependencies
        working-directory: templates/astro-blog
        run: npm ci

      - name: Type check
        working-directory: templates/astro-blog
        run: npx astro check

  docker-build:
    name: Docker Build
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.admin == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image (with layer cache)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: forja:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  ci-pass:
    name: CI Pass
    if: always()
    needs: [backend, admin, analytics, astro-blog, docker-build]
    runs-on: ubuntu-latest
    steps:
      - name: Check required jobs
        run: |
          if [[ "${{ needs.backend.result }}" == "failure" || "${{ needs.admin.result }}" == "failure" || "${{ needs.analytics.result }}" == "failure" || "${{ needs.astro-blog.result }}" == "failure" || "${{ needs.docker-build.result }}" == "failure" ]]; then
            echo "One or more required jobs failed"
            exit 1
          fi
